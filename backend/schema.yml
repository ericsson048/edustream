components:
  schemas:
    Assignment:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        title:
          type: string
          maxLength: 255
        description:
          type: string
        due_date:
          type: string
          format: date-time
        points:
          type: integer
          maximum: 2147483647
          minimum: 0
        type:
          $ref: '#/components/schemas/TypeEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
        course:
          type: string
          format: uuid
        created_by:
          type: string
          format: uuid
          readOnly: true
      required:
      - course
      - created_at
      - created_by
      - due_date
      - id
      - title
    Certificate:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        certificate_code:
          type: string
          maxLength: 64
        issued_at:
          type: string
          format: date-time
          readOnly: true
        user:
          type: string
          format: uuid
        course:
          type: string
          format: uuid
      required:
      - certificate_code
      - course
      - id
      - issued_at
      - user
    Conversation:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        participants:
          type: array
          items:
            $ref: '#/components/schemas/ConversationParticipant'
          readOnly: true
        latest_message:
          type: string
          readOnly: true
        name:
          type: string
          maxLength: 200
        is_group:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        created_by:
          type: string
          format: uuid
          readOnly: true
      required:
      - created_at
      - created_by
      - id
      - latest_message
      - participants
    ConversationParticipant:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user_name:
          type: string
          readOnly: true
        last_read_at:
          type: string
          format: date-time
          nullable: true
        conversation:
          type: string
          format: uuid
        user:
          type: string
          format: uuid
      required:
      - conversation
      - id
      - user
      - user_name
    Course:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        instructor_name:
          type: string
          readOnly: true
        modules:
          type: array
          items:
            $ref: '#/components/schemas/Module'
          readOnly: true
        title:
          type: string
          maxLength: 255
        slug:
          type: string
          maxLength: 280
          pattern: ^[-a-zA-Z0-9_]+$
        description:
          type: string
        category:
          type: string
          maxLength: 120
        level:
          $ref: '#/components/schemas/LevelEnum'
        thumbnail_url:
          type: string
          format: uri
          maxLength: 200
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        platform_fee_percentage:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
        is_published:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        instructor:
          type: string
          format: uuid
      required:
      - created_at
      - id
      - instructor
      - instructor_name
      - modules
      - slug
      - title
      - updated_at
    Discussion:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        comments:
          type: array
          items:
            $ref: '#/components/schemas/DiscussionComment'
          readOnly: true
        author_name:
          type: string
          readOnly: true
        title:
          type: string
          maxLength: 255
        content:
          type: string
        category:
          type: string
          maxLength: 120
        tags: {}
        likes_count:
          type: integer
          maximum: 2147483647
          minimum: 0
        created_at:
          type: string
          format: date-time
          readOnly: true
        course:
          type: string
          format: uuid
          nullable: true
        author:
          type: string
          format: uuid
          readOnly: true
      required:
      - author
      - author_name
      - comments
      - content
      - created_at
      - id
      - title
    DiscussionComment:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        author_name:
          type: string
          readOnly: true
        content:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
        discussion:
          type: string
          format: uuid
        author:
          type: string
          format: uuid
          readOnly: true
      required:
      - author
      - author_name
      - content
      - created_at
      - discussion
      - id
    Enrollment:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        course_title:
          type: string
          readOnly: true
        student_name:
          type: string
          readOnly: true
        purchased_at:
          type: string
          format: date-time
          readOnly: true
        is_active:
          type: boolean
        student:
          type: string
          format: uuid
          readOnly: true
        course:
          type: string
          format: uuid
      required:
      - course
      - course_title
      - id
      - purchased_at
      - student
      - student_name
    KindEnum:
      enum:
      - PDF
      - LINK
      - ZIP
      - OTHER
      type: string
      description: |-
        * `PDF` - PDF
        * `LINK` - Link
        * `ZIP` - Archive
        * `OTHER` - Other
    Lesson:
      type: object
