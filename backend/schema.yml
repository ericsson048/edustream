  /api/v1/ai/tutor/chat/:
    post:
      operationId: api_v1_ai_tutor_chat_create
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/assignments/:
    get:
      operationId: api_v1_assignments_list
      parameters:
      - in: query
        name: course
        schema:
          type: string
          format: uuid
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: type
        schema:
          type: string
          enum:
          - CODE
          - ESSAY
          - PROJECT
          - QUIZ
          - REPORT
        description: |-
          * `QUIZ` - Quiz
          * `PROJECT` - Project
          * `ESSAY` - Essay
          * `REPORT` - Report
          * `CODE` - Code
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAssignmentList'
          description: ''
    post:
      operationId: api_v1_assignments_create
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Assignment'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Assignment'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Assignment'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
          description: ''
