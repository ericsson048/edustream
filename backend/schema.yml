      required:
      - access
      - email
      - password
      - refresh
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          writeOnly: true
      required:
      - access
      - refresh
    TypeEnum:
      enum:
      - QUIZ
      - PROJECT
      - ESSAY
      - REPORT
      - CODE
      type: string
      description: |-
        * `QUIZ` - Quiz
        * `PROJECT` - Project
        * `ESSAY` - Essay
        * `REPORT` - Report
        * `CODE` - Code
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        email:
          type: string
          format: email
          maxLength: 254
        full_name:
          type: string
          maxLength: 255
        role:
          $ref: '#/components/schemas/RoleC1cEnum'
        stripe_account_id:
          type: string
          readOnly: true
          nullable: true
        stripe_customer_id:
          type: string
          readOnly: true
          nullable: true
        date_joined:
          type: string
          format: date-time
          readOnly: true
      required:
      - date_joined
      - email
      - full_name
      - id
      - stripe_account_id
      - stripe_customer_id
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
